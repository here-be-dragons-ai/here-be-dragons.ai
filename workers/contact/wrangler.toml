name = "hbd-contact"
main = "src/index.js"
compatibility_date = "2026-07-01"

workers_dev = true

routes = [
  { pattern = "api.here-be-dragons.ai", custom_domain = true }
]

# Secrets (set with `npx wrangler secret put <NAME>` from this directory):
#   AIRTABLE_TOKEN
#   AIRTABLE_BASE_ID
# Optional var:
[vars]
AIRTABLE_TABLE_NAME = "Contacts"
